<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width,
                 initial-scale=1.0">

    <title>404 | StacklyAgri</title>

    <link rel="stylesheet"
          href="assets/css/404.css">
          <link rel="stylesheet"
          href="assets/css/style.css">

    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
        rel="stylesheet">

</head>

<body>

    <section class="error section">

        <div class="container">

            <div class="error__container">

                <div class="error__content reveal-left">

                    <span class="section__tag">

                        <i class="ri-error-warning-line"></i>

                        Error 404

                    </span>

                    <h1 class="error__title">

                        Lost In The
                        Digital <span>Fields?</span>

                    </h1>

                    <p class="error__description">

                        The page you're looking for
                        may have been moved,
                        harvested, or no longer
                        exists.

                    </p>

                    <div class="error__buttons">

                        <a href="index.html"
                        class="button">

                            <i class="ri-home-line"></i>

                            Back Home

                        </a>

                        <button
                            class="button button--ghost"
                            onclick="history.back()">

                            <i class="ri-arrow-left-line"></i>

                            Go Back

                        </button>

                    </div>

                </div>

                <div class="error__quick reveal-up">

                    <h3>

                        <i class="ri-compass-3-line"></i>

                        Popular Pages

                    </h3>

                    <div class="error__quick-links">

                        <a href="service.html"
                        class="error__link-card">

                            <i class="ri-service-line"></i>

                            <span>Services</span>

                        </a>

                        <a href="project.html"
                        class="error__link-card">

                            <i class="ri-folder-line"></i>

                            <span>Projects</span>

                        </a>

                        <a href="contact.html"
                        class="error__link-card">

                            <i class="ri-customer-service-2-line"></i>

                            <span>Contact</span>

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="assets/js/404.js"></script>

</body>

</html>
